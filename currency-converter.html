<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Scattered news background, desktop only -->
  <div id="newsBackground" aria-hidden="true"></div>

  <!-- Main converter -->
  <div class="card">
    <h1>Currency Converter</h1>
    <p class="subtitle">Live exchange rates</p>

    <label>Amount</label>
    <input type="number" id="amount" placeholder="Enter amount" value="1" min="0" />

    <div class="row">
      <div>
        <label>From</label>
        <select id="from"></select>
      </div>
      <button class="swap-btn" onclick="swapCurrencies()" title="Swap">⇄</button>
      <div>
        <label>To</label>
        <select id="to"></select>
      </div>
    </div>

    <button class="convert-btn" id="convertBtn" onclick="convert()">Convert</button>

    <div class="spinner" id="spinner">Fetching live rate...</div>

    <div class="result" id="result">
      <div class="converted" id="convertedValue"></div>
      <div class="rate-info" id="rateInfo"></div>
      <button class="copy-btn" onclick="copyResult()" title="Copy result">Copy</button>
    </div>

    <div class="error" id="error"></div>

    <div class="chart-container" id="chartContainer">
      <p class="chart-title" id="chartTitle"></p>
      <canvas id="rateChart"></canvas>
    </div>

    <div class="history-section" id="historySection">
      <div class="history-header">
        <span>Recent Conversions</span>
        <button class="clear-btn" onclick="clearHistory()">Clear</button>
      </div>
      <ul id="historyList"></ul>
    </div>
  </div>

  <script src="news.js"></script>
  <script src="script.js"></script>
</body>
</html>
